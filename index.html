<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swim Meet Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Swim Meet Tracker</h1>
  </header>

  <main>

    <!-- Relay: Medley Relay -->
    <div class="event">
      <div class="event-name">Medley Relay</div>
      <div class="event-controls">
        <label>
          <input type="radio" name="medley-relay" value="win">
          Win
        </label>
        <label>
          <input type="radio" name="medley-relay" value="none">
          None
        </label>
      </div>
    </div>

    <!-- Individual: Individual Medley -->
    <div class="event">
      <div class="event-name">Individual Medley</div>
      <div class="event-controls">
        <label>
          <input type="checkbox" data-event="individual-medley" data-place="1st">
          1st
        </label>
        <label>
          <input type="checkbox" data-event="individual-medley" data-place="2nd">
          2nd
        </label>
        <label>
          <input type="checkbox" data-event="individual-medley" data-place="3rd">
          3rd
        </label>
        <label>
          <input type="checkbox" data-event="individual-medley" data-place="none">
          None
        </label>
      </div>
    </div>

    <!-- Individual: Freestyle -->
    <div class="event">
      <div class="event-name">Freestyle</div>
      <div class="event-controls">
        <label>
          <input type="checkbox" data-event="freestyle" data-place="1st">
          1st
        </label>
        <label>
          <input type="checkbox" data-event="freestyle" data-place="2nd">
          2nd
        </label>
        <label>
          <input type="checkbox" data-event="freestyle" data-place="3rd">
          3rd
        </label>
        <label>
          <input type="checkbox" data-event="freestyle" data-place="none">
          None
        </label>
      </div>
    </div>

    <!-- Individual: Backstroke -->
    <div class="event">
      <div class="event-name">Backstroke</div>
      <div class="event-controls">
        <label>
          <input type="checkbox" data-event="backstroke" data-place="1st">
          1st
        </label>
        <label>
          <input type="checkbox" data-event="backstroke" data-place="2nd">
          2nd
        </label>
        <label>
          <input type="checkbox" data-event="backstroke" data-place="3rd">
          3rd
        </label>
        <label>
          <input type="checkbox" data-event="backstroke" data-place="none">
          None
        </label>
      </div>
    </div>

    <!-- Individual: Breaststroke -->
    <div class="event">
      <div class="event-name">Breaststroke</div>
      <div class="event-controls">
        <label>
          <input type="checkbox" data-event="breaststroke" data-place="1st">
          1st
        </label>
        <label>
          <input type="checkbox" data-event="breaststroke" data-place="2nd">
          2nd
        </label>
        <label>
          <input type="checkbox" data-event="breaststroke" data-place="3rd">
          3rd
        </label>
        <label>
          <input type="checkbox" data-event="breaststroke" data-place="none">
          None
        </label>
      </div>
    </div>

    <!-- Individual: Butterfly -->
    <div class="event">
      <div class="event-name">Butterfly</div>
      <div class="event-controls">
        <label>
          <input type="checkbox" data-event="butterfly" data-place="1st">
          1st
        </label>
        <label>
          <input type="checkbox" data-event="butterfly" data-place="2nd">
          2nd
        </label>
        <label>
          <input type="checkbox" data-event="butterfly" data-place="3rd">
          3rd
        </label>
        <label>
          <input type="checkbox" data-event="butterfly" data-place="none">
          None
        </label>
      </div>
    </div>

    <!-- Relay: Freestyle Relay -->
    <div class="event">
      <div class="event-name">Freestyle Relay</div>
      <div class="event-controls">
        <label>
          <input type="radio" name="freestyle-relay" value="win">
          Win
        </label>
        <label>
          <input type="radio" name="freestyle-relay" value="none">
          None
        </label>
      </div>
    </div>

  </main>

  <div class="bottom-bar">
    <span id="total">Total: 0 pts</span>
    <button id="reset-btn">Reset</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
